name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube URL to download'
        required: true
        type: string
        placeholder: 'https://www.youtube.com/watch?v=...'
      
      download_type:
        description: 'Download type (video or audio)'
        required: true
        type: choice
        default: 'video'
        options:
          - video
          - audio
      
      quality:
        description: 'Video quality (best, 1080, 720, 480, worst)'
        required: false
        type: string
        default: 'best'
      
      folder_name:
        description: 'Optional subfolder name (leave empty for root)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Install yt-dlp and ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        sudo pip3 install yt-dlp
        yt-dlp --version
    
    - name: Create folders
      run: |
        mkdir -p videoz audioz
        if [ -n "${{ github.event.inputs.folder_name }}" ]; then
          if [ "${{ github.event.inputs.download_type }}" = "video" ]; then
            mkdir -p "videoz/${{ github.event.inputs.folder_name }}"
          else
            mkdir -p "audioz/${{ github.event.inputs.folder_name }}"
          fi
        fi
    
    - name: Download video
      if: ${{ github.event.inputs.download_type == 'video' }}
      run: |
        if [ -n "${{ github.event.inputs.folder_name }}" ]; then
          cd "videoz/${{ github.event.inputs.folder_name }}"
        else
          cd videoz
        fi
        
        yt-dlp \
          -f "${{ github.event.inputs.quality }}+bestaudio/best" \
          --merge-output-format mp4 \
          --embed-thumbnail \
          "${{ github.event.inputs.youtube_url }}"
        
        echo "✅ Video downloaded successfully!"
    
    - name: Download audio
      if: ${{ github.event.inputs.download_type == 'audio' }}
      run: |
        if [ -n "${{ github.event.inputs.folder_name }}" ]; then
          cd "audioz/${{ github.event.inputs.folder_name }}"
        else
          cd audioz
        fi
        
        yt-dlp \
          -f bestaudio/best \
          --extract-audio \
          --audio-format mp3 \
          --audio-quality 0 \
          --embed-thumbnail \
          "${{ github.event.inputs.youtube_url }}"
        
        echo "✅ Audio downloaded successfully!"
    
    - name: List downloaded files
      run: |
        echo "📁 Downloaded files:"
        echo "==================="
        
        if [ "${{ github.event.inputs.download_type }}" = "video" ]; then
          if [ -n "${{ github.event.inputs.folder_name }}" ]; then
            ls -la "videoz/${{ github.event.inputs.folder_name }}/"
          else
            ls -la videoz/
          fi
        else
          if [ -n "${{ github.event.inputs.folder_name }}" ]; then
            ls -la "audioz/${{ github.event.inputs.folder_name }}/"
          else
            ls -la audioz/
          fi
        fi
    
    - name: Upload to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: download-${{ github.run_id }}
        path: |
          videoz/
          audioz/
        retention-days: 7
