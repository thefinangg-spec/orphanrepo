name: YouTube Downloader (No Cookies - Android Workaround)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube URL'
        required: true
        type: string
      download_type:
        description: 'Video or audio'
        required: true
        type: choice
        options:
          - video
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install yt-dlp
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install yt-dlp
    
    - name: Download using Android client (avoids bot check)
      run: |
        mkdir -p download
        cd download
        
        CMD="yt-dlp --extractor-args youtube:player_client=android "
        
        if [ "${{ github.event.inputs.download_type }}" = "video" ]; then
          CMD="$CMD -f \"bestvideo+bestaudio\" --merge-output-format mp4"
        else
          CMD="$CMD -x --audio-format mp3"
        fi
        
        CMD="$CMD \"${{ github.event.inputs.youtube_url }}\""
        eval $CMD
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: download
        path: download/
